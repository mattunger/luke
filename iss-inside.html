<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside the ISS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔬 Inside the ISS 💻</h1>
        <p>Welcome aboard! Watch out for floating objects in zero gravity!</p>
        
        <a href="iss.html" class="nav-button">Go Outside the ISS</a>
        <a href="index.html" class="nav-button">Back to Mars</a>
        <h2 id="message"></h2>
    </div>

    <div class="iss-room">
        
        <div class="iss-window">
            <span class="window-view">🌍✨</span>
        </div>

        <div class="floating-crew" style="top: 15%; left: 15%;" onclick="document.getElementById('message').innerText = 'Commander: Welcome aboard the station! 👨‍🚀'">👨‍🚀</div>
        <div class="floating-crew dino-astro" style="top: 30%; right: 15%;" onclick="document.getElementById('message').innerText = 'Space Dino is trying to eat the floating apple! 🦖🍎'">🦖</div>
        <div class="floating-crew" style="top: 50%; left: 25%;" onclick="document.getElementById('message').innerText = 'Scientist: Doing some zero-gravity experiments! 👩‍🚀'">👩‍🚀</div>

        <div class="floating-tool" style="top: 15%; right: 40%;">🔧</div>
        <div class="floating-tool" style="top: 60%; left: 10%; animation-delay: 2s;">🍎</div>
        <div class="floating-tool" style="top: 40%; right: 35%; animation-delay: 1s;">📸</div>
        <div class="floating-tool" style="top: 20%; left: 45%; animation-delay: 3s;">🔬</div>

        <div class="control-panels">
            <span>🕹️</span>
            <span>💻</span>
            <span>🎛️</span>
            <span>🔋</span>
            <span>📡</span>
        </div>
    </div>

</body>
</html>

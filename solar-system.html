<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke's Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>☀️ The Solar System 🌍</h1>
        <p>Watch the planets and moons orbit!</p>
        
        <a href="index.html" class="nav-button">Go back to Mars!</a>

        <div class="solar-system">
            <div class="sun" onclick="alert('Hot! Hot! Hot! ☀️')">☀️</div>

            <div class="orbit-path earth-orbit">
                <div class="planet-group">
                    <div class="planet earth">🌍</div>
                    <div class="moon-orbit">
                        <div class="moon">🌑</div>
                    </div>
                </div>
            </div>

            <div class="orbit-path mars-orbit">
                <div class="planet-group">
                    <div class="planet mars">🪐</div>
                    <div class="moon-orbit moon1-orbit">
                        <div class="moon small-moon">🌑</div>
                    </div>
                    <div class="moon-orbit moon2-orbit">
                        <div class="moon small-moon">🌑</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
